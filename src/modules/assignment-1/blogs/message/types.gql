type User {
  id: ID!
  name: String!
  email: String!
  posts: [Post!]!
  isOnline: Boolean!
}

type Post {
  id: ID!
  title: String!
  content: String!
  author: User
  comments: [Comment!]!
  createdAt: String!
}

type Presence {
  userId: ID!
  isOnline: Boolean!
}

type Comment {
  id: ID!
  text: String!
  author: User
  post: Post!
}

type PageInfo {
  totalCount: Int!
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
}

type PostPage {
  posts: [Post!]!
  pageInfo: PageInfo!
}

